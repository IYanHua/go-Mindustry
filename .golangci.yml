# golangci-lint 配置
# 参考: https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  go: "1.22"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
  disable-all: false

linters-settings:
  goimports:
    local-prefixes: github.com/MonthZifang/mdt-server
  misspell:
    locale: US

issues:
  exclude-dirs:
    - custom_plugin
